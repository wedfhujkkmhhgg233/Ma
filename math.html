<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Trainer Pro FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 450px;
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

h1 {
    text-align: center;
}

.question {
    font-size: 36px;
    text-align: center;
    margin: 20px 0;
}

.timer {
    text-align: center;
    color: #facc15;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

.submit { background: #38bdf8; font-weight: bold; }
.start { background: #22c55e; }
.stop { background: #ef4444; }

.row {
    display: flex;
    gap: 8px;
}

.row label {
    flex: 1;
    background: #1f2937;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.score {
    text-align: center;
    margin-top: 10px;
    color: #4ade80;
}

.feedback {
    text-align: center;
    margin-top: 8px;
    min-height: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ Math Trainer Pro FIX</h1>

    <div class="timer">Time: <span id="time">10</span>s</div>

    <div class="question" id="question">Press Start</div>

    <input type="number" id="answer" placeholder="Answer">

    <button class="submit" onclick="checkAnswer()">Submit</button>

    <div class="score">Score: <span id="score">0</span></div>
    <div class="feedback" id="feedback"></div>

    <hr>

    <div class="row">
        <label><input type="checkbox" id="add" checked> +</label>
        <label><input type="checkbox" id="sub" checked> −</label>
    </div>

    <div class="row">
        <label><input type="checkbox" id="mul"> ×</label>
        <label><input type="checkbox" id="div"> ÷</label>
    </div>

    <select id="digits">
        <option value="1">1 Digit</option>
        <option value="2">2 Digits</option>
        <option value="3">3 Digits</option>
        <option value="4">4+ Digits</option>
    </select>

    <button class="start" onclick="startGame()">▶ Start</button>
    <button class="stop" onclick="stopGame()">⏸ Stop</button>

</div>

<script>
let num1, num2, op, correct;
let score = Number(localStorage.getItem("score") || 0);
let running = false;
let timer;
let time = 10;

document.getElementById("score").innerText = score;

function el(id) {
    return document.getElementById(id);
}

function saveSettings() {
    localStorage.setItem("settings", JSON.stringify({
        add: el("add").checked,
        sub: el("sub").checked,
        mul: el("mul").checked,
        div: el("div").checked,
        digits: el("digits").value
    }));
}

function loadSettings() {
    let s = JSON.parse(localStorage.getItem("settings"));
    if (!s) return;

    el("add").checked = s.add;
    el("sub").checked = s.sub;
    el("mul").checked = s.mul;
    el("div").checked = s.div;
    el("digits").value = s.digits;
}

loadSettings();

function getNumber() {
    let d = Number(el("digits").value);
    let min = Math.pow(10, d - 1);
    let max = Math.pow(10, d) - 1;
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickOp() {
    let ops = [];
    if (el("add").checked) ops.push("+");
    if (el("sub").checked) ops.push("-");
    if (el("mul").checked) ops.push("*");
    if (el("div").checked) ops.push("/");

    return ops.length ? ops[Math.floor(Math.random() * ops.length)] : "+";
}

function generate() {
    if (!running) return;

    op = pickOp();
    num1 = getNumber();
    num2 = getNumber();

    if (op === "/") {
        num2 = Math.max(1, num2);
        num1 = num1 - (num1 % num2);
    }

    switch(op) {
        case "+": correct = num1 + num2; break;
        case "-": correct = num1 - num2; break;
        case "*": correct = num1 * num2; break;
        case "/": correct = num1 / num2; break;
    }

    el("question").innerText = `${num1} ${op} ${num2}`;
    el("answer").value = "";
    el("feedback").innerText = "";

    resetTimer();
}

function checkAnswer() {
    if (!running) return;

    let user = Number(el("answer").value);

    if (user === correct) {
        score++;
        el("feedback").innerText = "✅ Correct!";
    } else {
        el("feedback").innerText = "❌ Answer: " + correct;
    }

    localStorage.setItem("score", score);
    el("score").innerText = score;

    generate();
}

function resetTimer() {
    clearInterval(timer);
    time = 10;
    el("time").innerText = time;

    timer = setInterval(() => {
        time--;
        el("time").innerText = time;

        if (time <= 0) {
            el("feedback").innerText = "⏱ Time up! Answer: " + correct;
            generate();
        }
    }, 1000);
}

function startGame() {
    saveSettings();
    running = true;
    generate();
}

function stopGame() {
    running = false;
    clearInterval(timer);
    el("question").innerText = "Paused";
}
</script>

</body>
</html>
