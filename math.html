<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Trainer Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    max-width: 420px;
    margin: auto;
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
}

h1 { font-size: 20px; }

.question {
    font-size: 30px;
    margin: 15px 0;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    font-size: 16px;
    cursor: pointer;
}

button:hover { background: #0ea5e9; }

.row {
    display: flex;
    gap: 5px;
}

.row label {
    flex: 1;
    background: #334155;
    padding: 8px;
    border-radius: 6px;
    font-size: 14px;
}

.timer { color: #facc15; }
.score { color: #4ade80; }

small { opacity: 0.8; }
</style>
</head>

<body>

<div class="container">
    <h1>⚡ Math Trainer Pro</h1>

    <div class="timer">Time: <span id="time">10</span>s</div>

    <div class="question" id="question">Setup first</div>

    <input type="number" id="answer" placeholder="Answer">

    <button onclick="checkAnswer()">Submit</button>

    <div class="info">
        Score: <span class="score" id="score">0</span>
    </div>

    <div id="feedback"></div>

    <hr>

    <h3>⚙ Settings</h3>

    <div class="row">
        <label><input type="checkbox" id="add" checked> +</label>
        <label><input type="checkbox" id="sub" checked> −</label>
    </div>
    <div class="row">
        <label><input type="checkbox" id="mul"> ×</label>
        <label><input type="checkbox" id="div"> ÷</label>
    </div>

    <select id="digits">
        <option value="1">1 Digit (easy gap training)</option>
        <option value="2">2 Digits</option>
        <option value="3">3 Digits</option>
        <option value="4">4+ Digits</option>
    </select>

    <button onclick="startGame()">▶ Start</button>
    <button onclick="stopGame()">⏸ Stop</button>

    <small>All data saved offline in browser</small>
</div>

<script>
let num1, num2, op, answer;
let score = localStorage.getItem("score") || 0;
let running = false;
let timer;
let time = 10;

document.getElementById("score").innerText = score;

function saveSettings() {
    localStorage.setItem("settings", JSON.stringify({
        add: add.checked,
        sub: sub.checked,
        mul: mul.checked,
        div: div.checked,
        digits: digits.value
    }));
}

function loadSettings() {
    let s = JSON.parse(localStorage.getItem("settings"));
    if (!s) return;

    add.checked = s.add;
    sub.checked = s.sub;
    mul.checked = s.mul;
    div.checked = s.div;
    digits.value = s.digits;
}

loadSettings();

function getNumber() {
    let d = parseInt(digits.value);
    let min = Math.pow(10, d - 1);
    let max = Math.pow(10, d) - 1;
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickOp() {
    let ops = [];
    if (add.checked) ops.push("+");
    if (sub.checked) ops.push("-");
    if (mul.checked) ops.push("*");
    if (div.checked) ops.push("/");

    if (ops.length === 0) return "+";
    return ops[Math.floor(Math.random() * ops.length)];
}

function generate() {
    if (!running) return;

    op = pickOp();
    num1 = getNumber();
    num2 = getNumber();

    if (op === "/") {
        num2 = Math.max(1, num2);
        num1 = num1 - (num1 % num2); // clean division
    }

    switch(op) {
        case "+": answer = num1 + num2; break;
        case "-": answer = num1 - num2; break;
        case "*": answer = num1 * num2; break;
        case "/": answer = num1 / num2; break;
    }

    document.getElementById("question").innerText =
        `${num1} ${op} ${num2}`;

    document.getElementById("answer").value = "";
    resetTimer();
}

function checkAnswer() {
    if (!running) return;

    let user = Number(answerBox.value);

    if (user === answer) {
        score++;
        feedback.innerText = "✅ Correct";
    } else {
        feedback.innerText = "❌ Answer: " + answer;
    }

    localStorage.setItem("score", score);
    document.getElementById("score").innerText = score;

    generate();
}

function resetTimer() {
    clearInterval(timer);
    time = 10;
    document.getElementById("time").innerText = time;

    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            feedback.innerText = "⏱ Time up! Answer: " + answer;
            generate();
        }
    }, 1000);
}

function startGame() {
    saveSettings();
    running = true;
    generate();
}

function stopGame() {
    running = false;
    clearInterval(timer);
    document.getElementById("question").innerText = "Paused";
}
</script>

</body>
</html>
