<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math Trainer Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 450px;
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
}

.question {
    font-size: 36px;
    text-align: center;
    margin: 20px 0;
    letter-spacing: 2px;
}

.timer {
    text-align: center;
    font-size: 18px;
    color: #facc15;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

.submit {
    background: #38bdf8;
    color: black;
    font-weight: bold;
}

.start {
    background: #22c55e;
}

.stop {
    background: #ef4444;
}

.row {
    display: flex;
    gap: 8px;
}

.row label {
    flex: 1;
    background: #1f2937;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}

.score {
    text-align: center;
    margin-top: 10px;
    font-size: 18px;
    color: #4ade80;
}

.feedback {
    text-align: center;
    margin-top: 8px;
    font-weight: bold;
    min-height: 20px;
}

small {
    display: block;
    text-align: center;
    opacity: 0.6;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ Math Trainer Pro</h1>

    <div class="timer">Time: <span id="time">10</span>s</div>

    <div class="question" id="question">Press Start</div>

    <input type="number" id="answer" placeholder="Type answer">

    <button class="submit" onclick="checkAnswer()">Submit</button>

    <div class="score">Score: <span id="score">0</span></div>
    <div class="feedback" id="feedback"></div>

    <hr>

    <div class="row">
        <label><input type="checkbox" id="add" checked> +</label>
        <label><input type="checkbox" id="sub" checked> −</label>
    </div>

    <div class="row">
        <label><input type="checkbox" id="mul"> ×</label>
        <label><input type="checkbox" id="div"> ÷</label>
    </div>

    <select id="digits">
        <option value="1">1 Digit (gap training)</option>
        <option value="2">2 Digits</option>
        <option value="3">3 Digits</option>
        <option value="4">4+ Digits</option>
    </select>

    <button class="start" onclick="startGame()">▶ Start</button>
    <button class="stop" onclick="stopGame()">⏸ Stop</button>

    <small>Fully offline • Saved in browser</small>
</div>

<script>
let num1, num2, op, correct;
let score = Number(localStorage.getItem("score") || 0);
let running = false;
let timer;
let time = 10;

document.getElementById("score").innerText = score;

const answerBox = document.getElementById("answer");
const feedback = document.getElementById("feedback");

function saveSettings() {
    localStorage.setItem("settings", JSON.stringify({
        add: add.checked,
        sub: sub.checked,
        mul: mul.checked,
        div: div.checked,
        digits: digits.value
    }));
}

function loadSettings() {
    let s = JSON.parse(localStorage.getItem("settings"));
    if (!s) return;

    add.checked = s.add;
    sub.checked = s.sub;
    mul.checked = s.mul;
    div.checked = s.div;
    digits.value = s.digits;
}
loadSettings();

function getNumber() {
    let d = Number(digits.value);
    let min = Math.pow(10, d - 1);
    let max = Math.pow(10, d) - 1;
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickOp() {
    let ops = [];
    if (add.checked) ops.push("+");
    if (sub.checked) ops.push("-");
    if (mul.checked) ops.push("*");
    if (div.checked) ops.push("/");

    return ops.length ? ops[Math.floor(Math.random() * ops.length)] : "+";
}

function generate() {
    if (!running) return;

    op = pickOp();
    num1 = getNumber();
    num2 = getNumber();

    if (op === "/") {
        num2 = Math.max(1, num2);
        num1 = num1 - (num1 % num2);
    }

    switch(op) {
        case "+": correct = num1 + num2; break;
        case "-": correct = num1 - num2; break;
        case "*": correct = num1 * num2; break;
        case "/": correct = num1 / num2; break;
    }

    document.getElementById("question").innerText = `${num1} ${op} ${num2}`;
    answerBox.value = "";
    feedback.innerText = "";

    resetTimer();
}

function checkAnswer() {
    if (!running) return;

    let user = Number(answerBox.value);

    if (user === correct) {
        score++;
        feedback.innerText = "✅ Correct!";
    } else {
        feedback.innerText = "❌ Answer: " + correct;
    }

    localStorage.setItem("score", score);
    document.getElementById("score").innerText = score;

    generate();
}

function resetTimer() {
    clearInterval(timer);
    time = 10;
    document.getElementById("time").innerText = time;

    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            feedback.innerText = "⏱ Time up! Answer: " + correct;
            generate();
        }
    }, 1000);
}

function startGame() {
    saveSettings();
    running = true;
    generate();
}

function stopGame() {
    running = false;
    clearInterval(timer);
    document.getElementById("question").innerText = "Paused";
}
</script>

</body>
</html>
